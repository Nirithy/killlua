<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lua 字节码反混淆工具 (WASM)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/vis-network.min.js"></script>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --sidebar-bg: #252526;
            --panel-bg: #2d2d2d;
            --text-color: #cccccc;
            --text-bright: #ffffff;
            --accent-color: #007acc;
            --accent-hover: #0062a3;
            --border-color: #3e3e42;
            --code-bg: #1e1e1e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 300px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .sidebar h2 {
            color: var(--text-bright);
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        @media (max-width: 768px) {
            .desktop-title {
                display: none;
            }
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--text-bright);
        }

        .file-input-container {
            margin-bottom: 20px;
        }

        input[type="file"] {
            width: 100%;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
        }

        .checkbox-item input {
            cursor: pointer;
        }

        .processing-list {
            margin-top: 20px;
            background: var(--panel-bg);
            border-radius: 6px;
            border: 1px solid var(--border-color);
            padding: 10px;
            max-height: 250px;
            overflow-y: auto;
            flex-grow: 1;
            margin-bottom: 10px;
        }

        .processing-list h3 {
            margin-top: 0;
            font-size: 1rem;
            color: var(--text-bright);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        .process-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.85rem;
        }

        .process-item:last-child {
            border-bottom: none;
        }

        .process-item .name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 10px;
            flex-grow: 1;
        }

        .process-item .actions {
            display: flex;
            gap: 5px;
        }

        .btn-mini {
            padding: 2px 6px;
            font-size: 0.75rem;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        .btn-mini:hover {
            background: var(--accent-hover);
        }

        button#processBtn {
            width: 100%;
            padding: 12px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        button#processBtn:hover {
            background: var(--accent-hover);
        }

        #status {
            padding: 10px;
            border-radius: 4px;
            font-size: 0.9rem;
            background: var(--panel-bg);
            text-align: center;
        }

        /* Main Content Styles */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            min-width: 0;
        }

        .tabs {
            display: flex;
            background: var(--sidebar-bg);
            border-bottom: 1px solid var(--border-color);
        }

        .tab {
            padding: 12px 24px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab.active {
            background: var(--panel-bg);
            border-bottom-color: var(--accent-color);
            color: var(--text-bright);
        }

        .tab:hover:not(.active) {
            background: rgba(255, 255, 255, 0.05);
        }

        .tab-content {
            flex-grow: 1;
            display: none;
            padding: 20px;
            overflow: auto;
            box-sizing: border-box;
        }

        .tab-content.active {
            display: flex;
            flex-direction: column;
        }

        /* Diff Container Styles */
        .diff-container {
            display: flex;
            gap: 10px;
            flex-grow: 1;
            min-height: 0;
        }

        .diff-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .diff-header {
            background: var(--sidebar-bg);
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-bottom: none;
            border-radius: 4px 4px 0 0;
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--text-bright);
        }

        /* Disassembly Output */
        pre {
            background: var(--code-bg);
            color: #d4d4d4;
            padding: 15px;
            border-radius: 0 0 4px 4px;
            margin: 0;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            line-height: 1.5;
            tab-size: 4;
            border: 1px solid var(--border-color);
            overflow: auto;
            flex-grow: 1;
        }

        /* CFG Container */
        #cfg-container {
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
        }

        #cfg-container svg {
            max-width: 100%;
            height: auto;
        }

        /* File Info Styles */
        .info-card {
            background: var(--panel-bg);
            border-radius: 8px;
            padding: 20px;
            border: 1px solid var(--border-color);
            max-width: 600px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: bold;
            color: var(--text-bright);
        }

        /* Mobile/Android UI compatibility */
        .mobile-header {
            display: none;
            background: var(--sidebar-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 20px;
            align-items: center;
            justify-content: space-between;
        }

        .mobile-header h2 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--text-bright);
        }

        .toggle-sidebar-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .mobile-header {
                display: flex;
                flex-shrink: 0;
            }

            .sidebar {
                position: absolute;
                top: 45px; /* height of mobile-header roughly */
                left: 0;
                right: 0;
                bottom: 0;
                width: 100%;
                height: calc(100vh - 45px);
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                display: none; /* Hidden by default on mobile */
                max-height: none;
                overflow-y: auto;
                z-index: 1000;
                box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            }

            .sidebar.show {
                display: flex;
            }

            .tabs {
                overflow-x: auto;
                flex-wrap: nowrap;
                -webkit-overflow-scrolling: touch;
                flex-shrink: 0;
            }

            .tab {
                white-space: nowrap;
                padding: 10px 15px;
            }

            .diff-container {
                flex-direction: column;
            }

            .diff-panel {
                flex: 1;
                min-height: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="mobile-header">
        <h2>Lua 反混淆编译器</h2>
        <button class="toggle-sidebar-btn" id="toggleSidebarBtn">☰ 菜单</button>
    </div>

    <div class="sidebar" id="sidebar">
        <h2 class="desktop-title">Lua 反混淆编译器</h2>

        <div class="file-input-container">
            <label for="fileInput">选择 Lua 字节码文件</label>
            <input type="file" id="fileInput" accept=".luac,.lua">
        </div>

        <div class="control-group">
            <label>优化选项</label>
            <div class="checkbox-group">
                <label class="checkbox-item">
                    <input type="checkbox" id="foldCheck"> 常量折叠 (Folding)
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="dbeCheck"> 死分支消除 (Dead Branch)
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="sbmCheck"> 顺序块合并 (Block Merge)
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="dceCheck"> 死代码消除 (Dead Code)
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="deflattenCheck"> 反扁平化 (Deflatten)
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="rseCheck"> 优化无用垃圾指令 (RSE)
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="normCheck"> 条件判断归一化 (Normalize)
                </label>
            </div>
            <div style="margin-top: 15px;">
                <input type="file" id="pluginUpload" accept=".wasm" style="display: none;">
                <button class="btn-mini" onclick="document.getElementById('pluginUpload').click()" style="padding: 6px 10px; width: 100%;">安装自定义插件 (WASM)</button>
            </div>
        </div>

        <button id="processBtn">开始处理字节码</button>

        <div class="processing-list">
            <h3>处理列表</h3>
            <div id="processItems">
                <!-- Items added here -->
            </div>
        </div>

        <div id="status">等待 WASM 加载...</div>
    </div>

    <div class="main-content">
        <div class="tabs">
            <div class="tab active" data-tab="disasm">反汇编对比</div>
            <div class="tab" data-tab="cfg">控制流图 (CFG)</div>
            <div class="tab" data-tab="cfg-dot">CFG DOT 源码</div>
            <div class="tab" data-tab="asm">汇编处理</div>
            <div class="tab" data-tab="structure">函数结构</div>
            <div class="tab" data-tab="info">文件详情</div>
        </div>

        <div id="disasm" class="tab-content active">
            <div class="diff-container">
                <div class="diff-panel">
                    <div class="diff-header">原始反汇编 (Baseline)</div>
                    <pre id="originalDisasm">暂无数据。请上传 Lua 字节码文件。</pre>
                </div>
                <div class="diff-panel">
                    <div class="diff-header">优化后反汇编 (Optimized)</div>
                    <pre id="optimizedDisasm">暂无数据。请点击“开始处理”。</pre>
                </div>
            </div>
        </div>

        <div id="cfg" class="tab-content">
            <div id="cfg-container">
                <p style="color: #333">尚未生成控制流图</p>
            </div>
        </div>

        <div id="cfg-dot" class="tab-content">
            <pre id="cfgDotOutput">尚未生成 DOT 源码。</pre>
        </div>

        <div id="asm" class="tab-content">
            <div class="control-group">
                <label>汇编 .lasm 内容</label>
                <div id="asmInput" style="width: 100%; height: 500px; border: 1px solid var(--border-color); border-radius: 4px;"></div>
            </div>
            <div style="display: flex; gap: 10px;">
                <input type="file" id="asmFileInput" accept=".lasm,.txt" style="display: none;">
                <button class="btn-mini" onclick="document.getElementById('asmFileInput').click()" style="padding: 10px 20px;">上传 .lasm 文件</button>
                <button id="assembleBtn" style="padding: 10px 20px; background: var(--accent-color); color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">开始汇编</button>
            </div>
            <div id="asmStatus" style="margin-top: 10px; font-size: 0.9rem;"></div>
        </div>

        <div id="structure" class="tab-content" style="padding: 20px; overflow-y: auto;">
            <div id="structure-container" style="background: var(--code-bg); color: #d4d4d4; padding: 15px; border-radius: 4px; border: 1px solid var(--border-color); font-family: monospace; white-space: pre;">
                <!-- Structure will be displayed here -->
            </div>
        </div>

        <div id="info" class="tab-content">
            <div class="info-card">
                <div class="info-item">
                    <span class="info-label">文件名</span>
                    <span id="info-filename">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">文件大小</span>
                    <span id="info-filesize">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">魔数 (Magic)</span>
                    <span id="info-magic">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">处理时间</span>
                    <span id="info-time">-</span>
                </div>
            </div>
        </div>
    </div>


    <!-- Node Editor Modal -->
    <div id="nodeEditorModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; align-items:center; justify-content:center;">
        <div style="background:var(--panel-bg); width:80%; max-width:800px; padding:20px; border-radius:8px; display:flex; flex-direction:column; gap:10px; border: 1px solid var(--border-color); box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
            <h3 style="margin-top:0; color:var(--text-bright);">可视化高级节点编辑</h3>
            <textarea id="nodeEditorTextarea" style="width:100%; height:400px; background:var(--code-bg); color:#d4d4d4; font-family:'Consolas', 'Monaco', monospace; padding:15px; border:1px solid var(--border-color); border-radius:4px; resize:vertical; tab-size:4; box-sizing:border-box;"></textarea>
            <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:10px;">
                <button id="nodeEditorCancel" style="padding:10px 20px; background:#555; border:none; color:white; border-radius:4px; cursor:pointer; font-weight:bold;">取消</button>
                <button id="nodeEditorSave" style="padding:10px 20px; background:var(--accent-color); border:none; color:white; border-radius:4px; cursor:pointer; font-weight:bold;">保存</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>

    <script>

        let monacoEditor = null;

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            monaco.languages.register({ id: 'lasm' });
            monaco.languages.setMonarchTokensProvider('lasm', {
                tokenizer: {
                    root: [
                        [/^\s*\d+:/, 'keyword'],  // PC
                        [/\[.*?\]/, 'number'],   // Brackets for line numbers/constants
                        [/\b(MOVE|LOADK|LOADKX|LOADBOOL|LOADNIL|GETUPVAL|GETTABUP|GETTABLE|SETTABUP|SETUPVAL|SETTABLE|NEWTABLE|SELF|ADD|SUB|MUL|MOD|POW|DIV|IDIV|BAND|BOR|BXOR|SHL|SHR|UNM|BNOT|NOT|LEN|CONCAT|JMP|EQ|LT|LE|TEST|TESTSET|CALL|TAILCALL|RETURN|FORLOOP|FORPREP|TFORCALL|TFORLOOP|SETLIST|CLOSURE|VARARG|EXTRAARG)\b/, 'keyword'], // Opcodes
                        [/;.*/, 'comment'], // Comments
                        [/\b(R\d+|U\d+|K\d+)\b/, 'variable'], // Registers/Upvalues/Constants
                    ]
                }
            });

            monaco.editor.defineTheme('lasm-dark', {
                base: 'vs-dark',
                inherit: true,
                rules: [
                    { token: 'keyword', foreground: '569cd6' },
                    { token: 'number', foreground: 'b5cea8' },
                    { token: 'comment', foreground: '608b4e' },
                    { token: 'variable', foreground: '9cdcfe' }
                ],
                colors: {
                    'editor.background': '#1e1e1e'
                }
            });

            monacoEditor = monaco.editor.create(document.getElementById('asmInput'), {
                value: '-- 粘贴 .lasm 内容或点击下方上传',
                language: 'lasm',
                theme: 'lasm-dark',
                automaticLayout: true,
                minimap: { enabled: false },
                scrollBeyondLastLine: false,
                fontSize: 14,
                fontFamily: "'Consolas', 'Monaco', 'Courier New', monospace"
            });
        });

        // Helper to set editor value safely
        function setAsmInputValue(val) {
            if (monacoEditor) {
                monacoEditor.setValue(val);
            } else {
                // fallback if not loaded yet
                setTimeout(() => setAsmInputValue(val), 100);
            }
        }

        function getAsmInputValue() {
            return monacoEditor ? monacoEditor.getValue() : '';
        }

        let LuaDeob = null;
        let currentBytecode = null;
        let currentFileName = "";

        let installedPlugins = [];

        // Handle Plugin Upload
        const pluginUpload = document.getElementById('pluginUpload');
        if (pluginUpload) {
            pluginUpload.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const wasmModule = await WebAssembly.instantiate(arrayBuffer, {
                        env: {
                            memory: new WebAssembly.Memory({ initial: 256 })
                        }
                    });

                    const exports = wasmModule.instance.exports;

                    // Validate plugin interface
                    if (!exports.process || !exports.alloc_mem || !exports.free_mem || !exports.get_size || !exports.memory) {
                        alert('插件接口不兼容。需导出: alloc_mem, free_mem, process, get_size 和 memory');
                        return;
                    }

                    const pluginName = file.name.replace('.wasm', '');
                    const pluginId = 'plugin_' + Date.now();

                    installedPlugins.push({
                        id: pluginId,
                        name: pluginName,
                        exports: exports
                    });

                    // Add to UI
                    const cbGroup = document.querySelector('.checkbox-group');
                    const label = document.createElement('label');
                    label.className = 'checkbox-item';
                    label.innerHTML = `<input type="checkbox" id="${pluginId}"> [插件] ${pluginName}`;
                    cbGroup.appendChild(label);

                    // Add listener for real-time update
                    document.getElementById(pluginId).onchange = scheduleUpdateDeobfuscation;

                    alert(`插件 "${pluginName}" 安装成功并已加入优化列表！`);

                } catch (err) {
                    console.error(err);
                    alert('插件加载失败: ' + err.message);
                }

                // Clear input so same file can be selected again
                pluginUpload.value = '';
            });
        }

        // Apply plugins sequentially to bytecode
        function applyPlugins(bytecodeUint8) {
            let currentData = new Uint8Array(bytecodeUint8);

            for (const plugin of installedPlugins) {
                const checkbox = document.getElementById(plugin.id);
                if (checkbox && checkbox.checked) {
                    const exports = plugin.exports;
                    const memory = new Uint8Array(exports.memory.buffer);

                    const inLen = currentData.length;
                    const inPtr = exports.alloc_mem(inLen);

                    // Copy data to plugin memory
                    memory.set(currentData, inPtr);

                    // Process
                    const outPtr = exports.process(inPtr, inLen);
                    const outSize = exports.get_size();

                    // Read back
                    if (outSize > 0 && outPtr !== 0) {
                        const newMem = new Uint8Array(exports.memory.buffer);
                        currentData = new Uint8Array(newMem.slice(outPtr, outPtr + outSize));
                    }

                    exports.free_mem(inPtr);
                }
            }

            return currentData;
        }


        // Sidebar Toggle Logic for Mobile
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('toggleSidebarBtn');
        if (toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                sidebar.classList.toggle('show');
            });
        }

        // Tab Switching Logic
        document.querySelectorAll('.tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

                tab.classList.add('active');
                document.getElementById(tab.dataset.tab).classList.add('active');

                // Lazy load CFG if pending
                if (tab.dataset.tab === 'cfg' && pendingDot) {
                    renderCFG(pendingDot);
                    pendingDot = null;
                }
            };
        });

        // Setup Synchronized Scrolling for Comparison
        document.addEventListener('DOMContentLoaded', () => {
            const origDisasm = document.getElementById('originalDisasm');
            const optDisasm = document.getElementById('optimizedDisasm');

            let isSyncingLeftScroll = false;
            let isSyncingRightScroll = false;

            origDisasm.addEventListener('scroll', function(e) {
                if (!isSyncingLeftScroll) {
                    isSyncingRightScroll = true;
                    optDisasm.scrollTop = this.scrollTop;
                    optDisasm.scrollLeft = this.scrollLeft;
                }
                isSyncingLeftScroll = false;
            });

            optDisasm.addEventListener('scroll', function(e) {
                if (!isSyncingRightScroll) {
                    isSyncingLeftScroll = true;
                    origDisasm.scrollTop = this.scrollTop;
                    origDisasm.scrollLeft = this.scrollLeft;
                }
                isSyncingRightScroll = false;
            });
        });

        async function initWasm() {
            if (typeof Module !== 'undefined') {
                try {
                    if (Module.ready) {
                        await Module.ready;
                    }
                    LuaDeob = Module;
                    document.getElementById('status').innerText = 'WASM 加载成功';
                    document.getElementById('status').style.color = '#4caf50';
                } catch (e) {
                    document.getElementById('status').innerText = 'WASM 加载失败: ' + e;
                    document.getElementById('status').style.color = '#f44336';
                }
            } else {
                document.getElementById('status').innerText = '未找到 WASM 模块';
                document.getElementById('status').style.color = '#f44336';
            }
        }

        function addProcessItem(name, data, type) {
            const container = document.getElementById('processItems');
            const item = document.createElement('div');
            item.className = 'process-item';

            const nameEl = document.createElement('span');
            nameEl.className = 'name';
            nameEl.innerText = name;
            nameEl.title = name;

            const actions = document.createElement('div');
            actions.className = 'actions';

            const dlBtn = document.createElement('button');
            dlBtn.className = 'btn-mini';
            dlBtn.innerText = '下载';
            dlBtn.onclick = () => {
                const blob = type === 'luac' ? new Blob([data], {type: 'application/octet-stream'}) : new Blob([data], {type: 'text/plain'});
                const reader = new FileReader();
                reader.onloadend = () => {
                    const url = reader.result;
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = name;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                };
                reader.readAsDataURL(blob);
            };

            actions.appendChild(dlBtn);
            item.appendChild(nameEl);
            item.appendChild(actions);
            container.prepend(item);
        }

        document.getElementById('asmFileInput').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (re) => {
                setAsmInputValue(re.target.result);
            };
            reader.readAsText(file);
        };

        document.getElementById('assembleBtn').onclick = async () => {
            const content = getAsmInputValue();
            if (!content) {
                alert('请先输入或上传 .lasm 内容');
                return;
            }

            try {
                document.getElementById('asmStatus').innerText = '正在汇编...';
                document.getElementById('asmStatus').style.color = '#cccccc';
                const result = LuaDeob.assemble(content);
                if (result.success) {
                    document.getElementById('asmStatus').innerText = '汇编成功';
                    document.getElementById('asmStatus').style.color = '#4caf50';
                    addProcessItem("assembled_" + Date.now() + ".luac", result.bytecode, 'luac');

                    // Immediately load the newly assembled bytecode as the currentBytecode
                    currentBytecode = result.bytecode;

                    // Trigger the deobfuscation logic to refresh all views (Disassembly, CFG, Structure)
                    updateDeobfuscation();
                } else {
                    document.getElementById('asmStatus').innerText = '汇编失败: ' + result.error;
                    document.getElementById('asmStatus').style.color = '#f44336';
                }
            } catch (err) {
                document.getElementById('asmStatus').innerText = '运行错误: ' + err.message;
                document.getElementById('asmStatus').style.color = '#f44336';
            }
        };

        let deobfuscateTimeout = null;
        function scheduleUpdateDeobfuscation() {
            if (deobfuscateTimeout) clearTimeout(deobfuscateTimeout);
            deobfuscateTimeout = setTimeout(updateDeobfuscation, 300);
        }

        let pendingDot = null;
        async function updateDeobfuscation() {
            if (!currentBytecode || !LuaDeob) return;

            try {
                // Save current scroll position to restore it after update
                const optDisasm = document.getElementById('optimizedDisasm');
                const savedScrollTop = optDisasm.scrollTop;
                const savedScrollLeft = optDisasm.scrollLeft;

                const startTime = performance.now();
                document.getElementById('status').innerText = '正在处理...';
                document.getElementById('status').style.color = '#cccccc';

                const fold = document.getElementById('foldCheck').checked;
                const dbe = document.getElementById('dbeCheck').checked;
                const sbm = document.getElementById('sbmCheck').checked;
                const dce = document.getElementById('dceCheck').checked;
                const deflatten = document.getElementById('deflattenCheck').checked;
                const rse = document.getElementById('rseCheck').checked;
                const norm = document.getElementById('normCheck').checked;


                const processedBytecode = applyPlugins(currentBytecode);
                const result = LuaDeob.deobfuscate(processedBytecode, fold, dbe, sbm, dce, deflatten, rse, norm);

                const endTime = performance.now();
                document.getElementById('info-time').innerText = (endTime - startTime).toFixed(2) + ' ms';

                if (result.success) {
                    document.getElementById('optimizedDisasm').innerText = result.disassembly;
                    document.getElementById('cfgDotOutput').innerText = result.dot;
                    try {
                        const structObj = JSON.parse(result.structure);
                        document.getElementById('structure-container').innerText = JSON.stringify(structObj, null, 2);
                    } catch(e) {
                        document.getElementById('structure-container').innerText = '结构解析错误: ' + e.message;
                    }
                    pendingDot = result.dot;

                    // Only render CFG immediately if the CFG tab is active
                    if (document.querySelector('.tab[data-tab="cfg"]').classList.contains('active')) {
                        renderCFG(pendingDot);
                        pendingDot = null;
                    }

                    // Restore scroll position
                    optDisasm.scrollTop = savedScrollTop;
                    optDisasm.scrollLeft = savedScrollLeft;

                    document.getElementById('status').innerText = '处理完成';
                    document.getElementById('status').style.color = '#4caf50';

                    // Update download items if needed, or just let users download via separate button
                } else {
                    document.getElementById('optimizedDisasm').innerText = '错误: ' + result.error;
                    document.getElementById('status').innerText = '处理失败';
                    document.getElementById('status').style.color = '#f44336';
                }
            } catch (err) {
                console.error(err);
                document.getElementById('status').innerText = '运行错误: ' + err.message;
                document.getElementById('status').style.color = '#f44336';
            }
        }

        // Add real-time update listeners
        ['foldCheck', 'dbeCheck', 'sbmCheck', 'dceCheck', 'deflattenCheck', 'rseCheck', 'normCheck'].forEach(id => {
            document.getElementById(id).onchange = scheduleUpdateDeobfuscation;
        });

        document.getElementById('fileInput').onchange = async (e) => {
            if (e.target.files.length === 0) return;
            const file = e.target.files[0];
            currentFileName = file.name;
            const reader = new FileReader();

            document.getElementById('info-filename').innerText = file.name;
            document.getElementById('info-filesize').innerText = (file.size / 1024).toFixed(2) + ' KB';

            // Auto-hide sidebar on mobile after selecting a file to show the main content
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('show');
            }

            reader.onload = async (re) => {

                const magic = Array.from(currentBytecode.slice(0, 4)).map(b => b.toString(16).padStart(2, '0')).join(' ');

                // Get baseline disassembly

                        document.getElementById('originalDisasm').innerText = result.disassembly;
                        updateDeobfuscation();

                        document.getElementById('originalDisasm').innerText = '解析失败: ' + result.error;

        document.getElementById('processBtn').onclick = async () => {

            const dbe = document.getElementById('dbeCheck').checked;
            const sbm = document.getElementById('sbmCheck').checked;
            const dce = document.getElementById('dceCheck').checked;
            const deflatten = document.getElementById('deflattenCheck').checked;
            const rse = document.getElementById('rseCheck').checked;
            const norm = document.getElementById('normCheck').checked;


                const processedBytecode = applyPlugins(currentBytecode);
                const result = LuaDeob.deobfuscate(processedBytecode, fold, dbe, sbm, dce, deflatten, rse, norm);
            if (result.success) {
                const baseName = currentFileName.replace(/\.[^/.]+$/, "");

                    document.getElementById('sidebar').classList.remove('show');
                }
            } else {
                alert('处理失败: ' + result.error);
            }
        };

        async function renderCFG(dot) {
            try {
                const container = document.getElementById('cfg-container');
                container.innerHTML = '';

                // Replace literal \n in dot string with actual newlines so parser handles multiline text
                // vis.network.convertDot handles actual newlines if quoted.
                const unescapedDot = dot.replace(/\\n/g, '\n');

                const parsedData = vis.network.convertDot(unescapedDot);

                const data = {
                    nodes: new vis.DataSet(parsedData.nodes.map(n => {
                        // Apply default styling
                        n.shape = 'box';
                        n.font = { face: 'Consolas, Monaco, monospace', align: 'left', size: 14, color: 'black' };
                        n.color = { background: n.color || '#E0E0E0', border: '#333333' };
                        if (n.color === 'green') n.color.background = '#90EE90';
                        if (n.color === 'red') n.color.background = '#FFB6C1';
                        return n;
                    })),
                    edges: new vis.DataSet(parsedData.edges.map(e => {
                        e.arrows = 'to';
                        e.font = { align: 'horizontal', color: 'black' };
                        return e;
                    }))
                };

                const options = {
                    layout: {
                        improvedLayout: false,
                        hierarchical: {
                            direction: 'UD',
                            sortMethod: 'directed',
                            nodeSpacing: 250,
                            levelSeparation: 200,
                            treeSpacing: 250
                        }
                    },
                    physics: {
                        enabled: false
                    },
                    edges: {
                        smooth: {
                            type: 'cubicBezier',
                            forceDirection: 'vertical',
                            roundness: 0.4
                        }
                    },
                    interaction: {
                        hover: true,
                        navigationButtons: true,
                        keyboard: true,
                        hideEdgesOnDrag: true
                    }
                };

                const network = new vis.Network(container, data, options);

                network.on("doubleClick", function (params) {
                    if (params.nodes.length > 0) {
                        const nodeId = params.nodes[0];
                        const node = data.nodes.get(nodeId);

                        const modal = document.getElementById('nodeEditorModal');
                        const textarea = document.getElementById('nodeEditorTextarea');
                        const saveBtn = document.getElementById('nodeEditorSave');
                        const cancelBtn = document.getElementById('nodeEditorCancel');

                        textarea.value = node.label;
                        modal.style.display = 'flex';

                        const closeEditor = () => {
                            modal.style.display = 'none';
                            saveBtn.onclick = null;
                            cancelBtn.onclick = null;
                        };

                        cancelBtn.onclick = closeEditor;

                        saveBtn.onclick = () => {
                            const newLabel = textarea.value;
                            data.nodes.update({ id: nodeId, label: newLabel });

                            // To actually integrate with compilation, we take all node labels,
                            // order them, and construct an ASM string.
                            const allNodes = data.nodes.get();
                            allNodes.sort((a,b) => parseInt(a.id) - parseInt(b.id));
                            let asmContent = "";
                            allNodes.forEach(n => {
                                // Extract just the instructions, ignoring the "BBx [PC y-z]" header
                                const parts = n.label.split('\n');
                                parts.slice(1).forEach(p => {
                                    // Remove the "PC: " prefix
                                    const codeMatch = p.match(/^\d+:\s*(.*)/);
                                    if (codeMatch) asmContent += codeMatch[1] + "\n";
                                    else asmContent += p + "\n";
                                });
                            });

                            setAsmInputValue(asmContent);
                            // Switch to ASM tab automatically
                            document.querySelector('.tab[data-tab="asm"]').click();
                            closeEditor();
                        };
                    }
                });

            } catch (e) {
                console.error(e);
                document.getElementById('cfg-container').innerHTML = `<p style="color: red; padding: 20px;">CFG 渲染错误: ${e.message || e}</p>`;
            }
        }

        window.onload = initWasm;
    </script>
